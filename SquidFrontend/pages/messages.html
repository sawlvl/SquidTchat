<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquidTchat | Messages</title>
    <link rel="stylesheet" type="text/css" href="../css/messages.css">
    <link rel="stylesheet" href="../css/forum.css">
</head>
<body>
    <div class="pages">

        <div class="conversations" id="sidebar">

            <div class="conv-header">
                <div class="container-btn-f">
                    <a href="../pages/forum.html" class="btn-f">F</a>
                </div>
                <div class="container-btn-add" id="btn-add">
                    <img src="../img/Boutons/add_button.svg" class="btn-add" alt="Ajouter">
                </div>
            </div>

            <div class="toggle-container">
                <button class="toggle-btn" id="toggle-groupe" onclick="basculerMode('groupe')">GROUPE</button>
                <button class="toggle-btn active" id="toggle-mp" onclick="basculerMode('mp')">MP</button>
            </div>

            <div class="conv-liste" id="liste-mp"></div>

            <div class="conv-liste" id="liste-groupe" style="display:none;"></div>

        </div>

        <div class="main-content">

            <div class="search-bar" style="display:none;">
                <div class="mp-search-section">
                    <input type="text" class="input-nouveau-mp" placeholder="Entrer un pseudo..." />
                    <div class="search-results"></div>
                </div>

                <div class="group-create-section" style="display:none;">
                    <div class="group-search-top">
                        <div class="group-search-input-shell">
                            <input type="text" class="input-group-member" placeholder="Cherchr un utilisateur ..." />
                            <button class="group-search-action" type="button" tabindex="-1" aria-hidden="true">
                                <img src="../img/Boutons/arrow_right_button.svg" alt="Recherche"/>
                            </button>
                        </div>
                    </div>

                    <div class="group-search-results"></div>

                    <div class="group-builder-card">
                        <p class="group-builder-label">Nom du groupe :</p>
                        <input type="text" class="input-group-name" placeholder="Entree le nom du groupe..." />

                        <p class="group-builder-label">Menmbre :</p>
                        <div class="group-selected-members"></div>

                        <button class="create-group-btn" type="button">
                            <span>Cree le groupe</span>
                            <span class="create-group-icon">&#10003;</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="chat-header" style="display:none;">
                <div class="chat-header-main">
                    <p class="chat-mode-label">Conversation</p>
                    <h1 class="chat-title">Messagerie</h1>
                </div>
            </div>

            <div class="messages" style="display: none;"></div>

            <aside class="group-info-panel" id="group-info-panel">
                <div class="group-info-panel-header">
                    <div>
                        <h2 class="group-panel-title">PANELLE D'INFORMATION DU GROUPE</h2>
                    </div>
                    <button class="group-panel-close" id="group-info-close" type="button">&times;</button>
                </div>

                <div class="group-info-body">
                    <section class="group-info-section group-admin-summary">
                        <h3>Admin :</h3>
                        <div class="group-admin-chip group-admin-name">-</div>
                    </section>

                    <section class="group-info-section admin-only group-admin-words" style="display:none;">
                        <h3>Mots a bloquer :</h3>
                        <div class="group-words-panel">
                            <div class="group-words-list"></div>
                            <div class="group-admin-form">
                                <input type="text" class="group-word-input" placeholder="Entrer un mot a bloquer ..." />
                                <button class="group-word-add-btn" type="button">&#10140;</button>
                            </div>
                        </div>
                    </section>

                    <section class="group-info-section">
                        <h3>Menmbre :</h3>
                        <div class="group-members-panel">
                            <div class="group-members-list"></div>
                            <div class="group-kick-list admin-only" style="display:none;"></div>
                        </div>
                    </section>
                </div>

                <div class="group-info-footer">
                    <button class="group-secondary-action" id="group-leave-btn" type="button">Quitter le groupe</button>
                    <button class="group-danger-action admin-only" id="group-close-btn" type="button" style="display:none;">Fermer le groupe</button>
                </div>
            </aside>

            <div class="chat-input-bar" style="display:none;">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-saisie" placeholder="Votre message..." />
                    <button class="chat-btn-fleche" onclick="envoyerMessageConversation()">
                        <img src="../img/Boutons/arrow_right_button.svg" alt="Envoyer"/>
                    </button>
                    <button class="chat-btn-info" id="group-info-toggle" type="button" style="display:none;">i</button>
                </div>
            </div>

            <div class="attente" id="attente-mp">
                <img src="../img/Logos/squidtchat_attente.jpg" alt="Logo attente">
                <p>CLIQUE SUR UN MESSAGE PRIVÉ</p>
            </div>

            <div class="attente" id="attente-groupe" style="display:none;">
                <img src="../img/Logos/squidtchat_attente_GRP.png" alt="Logo attente">
                <p>CLIQUE OU CRÉE UN GROUPE</p>
            </div>

        </div>
    </div>

    <script src="../javascript/auth.js"></script>
    <script src="../config/config.js"></script>
    <script src="../javascript/websocket.js"></script>
    <script src="../javascript/messages.js"></script>
</body>
</html>
